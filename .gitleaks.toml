title = "Gatishil - Secret Scan Policy"
[extend]

[allowlist]
description = "Ignore non-sensitive demo/test and binary assets"
paths = [
  '''^docs/''',
  '''^examples?/''',
  '''^fixtures?/''',
  '''^tests?/''',
  '''^__tests__/''',
  '''^specs?/''',
  '''^cypress/''',
  '''^e2e/''',
  '''\.md$''',
  '''^\.github/ISSUE_TEMPLATE/''',
  '''\.snap$''',
  '''^public/''',
  '''^assets?/''',
  '''^.*\.(png|jpg|jpeg|svg|webp|gif|mp4|mov|ico|pdf|woff2?)$'''
]

regexes = [
  '''(?i)(xxxxxxxx|changeme|your_[a-z0-9_]+_here)''',
  '''(?i)(example|sample|dummy|placeholder)[-_]?(key|token|secret|password)''',
  '''^http://localhost:\d{2,5}'''
]

files = [
  ".env.example",
  "env.example",
  ".env.local.example"
]

commits = []
