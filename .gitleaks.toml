title = "Gatishil - Secret Scan Policy"
[extend]
# Keep default rules, just add allowlists below.

[allowlist]
description = "Allow non-sensitive demo/test files"
paths = [
  '''^docs/''',
  '''^examples?/''',
  '''^fixtures?/''',
  '''^tests?/''',
  '''^__tests__/''',
  '''^specs?/''',
  '''^cypress/''',
  '''^e2e/''',
  '''\.md$''',
  '''^\.github/ISSUE_TEMPLATE/''',
  '''\.snap$''',
  '''^public/''',
  '''^assets?/''',
  '''^.*\.png$''',
  '''^.*\.jpg$''',
  '''^.*\.svg$''',
  '''^.*\.webp$''',
  '''^.*\.gif$''',
  '''^.*\.mp4$''',
  '''^.*\.mov$''',
  '''^.*\.ico$''',
  '''^.*\.pdf$''',
  '''^.*\.woff2?$'''
]

regexes = [
  # Empty secrets or placeholders
  '''(?i)(xxxxxxxx|changeme|your_[a-z0-9_]+_here)''',
  '''(?i)(example|sample|dummy|placeholder)[-_]?(key|token|secret|password)''',
  # Localhost URIs
  '''^http://localhost:\d{2,5}''',
]

# Ignored files by name
files = [
  ".env.example",
  "env.example",
  ".env.local.example",
]

# Redact allowed group matches in reports
commits = []
