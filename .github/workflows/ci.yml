name: build-and-test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Primary npm config (npmjs)
      - name: Configure npm (primary registry)
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 600000
          npm config set prefer-online true
          npm config set legacy-peer-deps true
          npm config set audit false
          npm config set fund false

      # Try npmjs; if 403/timeout, fall back to npmmirror
      - name: Install deps (try npmjs, then mirror)
        run: |
          npm i --no-audit --no-fund || (
            echo "npmjs install failed; switching to mirror…" &&
            npm config set registry https://registry.npmmirror.com &&
            npm i --no-audit --no-fund
          )

      - name: Typecheck (if present)
        run: npm run typecheck --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present

      - name: Unit tests
        run: npm test --if-present

      - name: Upload coverage (optional)
        if: success() && hashFiles('coverage/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
