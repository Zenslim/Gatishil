name: Secret Scans

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --redact --verbose --report-format json --report-path gitleaks-report.json

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3
        with:
          scan: git
          extra_args: >-
            --fail
            --json
            --no-update

  secretlint:
    name: Secretlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Secretlint
        run: npm install --global @secretlint/secretlint @secretlint/secretlint-rule-preset-recommend
      - name: Run Secretlint
        run: secretlint "**/*"
