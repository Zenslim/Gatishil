name: Secret Scans

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # required for PRs per action docs
        with:
          config-path: .gitleaks.toml                 # use repo policy
          redact: true
          fail-on-detection: true

  secretlint:
    name: Secretlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Secretlint
        run: |
          npx -y @secretlint/secretlint --format @secretlint/formatter-stylish .

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install TruffleHog (PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade trufflehog
      - name: Run TruffleHog filesystem scan
        run: |
          trufflehog filesystem . \
            --exclude-paths .trufflehogignore \
            --no-update \
            --fail

