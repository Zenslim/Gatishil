name: Secret Scans

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required by the action for PR events
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml   # uses your repo policy if present
          redact: true
          fail-on-detection: true

  secretlint:
    name: Secretlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Secretlint
        run: |
          npx -y \
            --package=secretlint \
            --package=@secretlint/secretlint-rule-preset-recommend \
            secretlint .

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pull Request: scan only the diff with v3 CLI via official Docker image
      - name: Run TruffleHog on PR diff (v3)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker://ghcr.io/trufflesecurity/trufflehog:latest
        with:
          args: >
            git
            --base "${{ github.event.pull_request.base.sha }}"
            --head "${{ github.sha }}"
            --only-verified
            --exclude-paths .trufflehogignore
            --fail

      # Push: scan full working tree (filesystem mode) with v3 CLI
      - name: Run TruffleHog on full tree (v3)
        if: ${{ github.event_name == 'push' }}
        uses: docker://ghcr.io/trufflesecurity/trufflehog:latest
        with:
          args: >
            filesystem
            --path .
            --only-verified
            --exclude-paths .trufflehogignore
            --fail
