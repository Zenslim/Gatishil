name: Secret Scans

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks (v2 action)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # REQUIRED for PRs
        with:
          config-path: .gitleaks.toml                 # use our policy
          redact: true
          fail-on-detection: true

  secretlint:
    name: Secretlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Secretlint via npx
        run: |
          npx -y secretlint "**/*" -f @secretlint/formatter-stylish

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog v3
        uses: trufflesecurity/trufflehog@v3
        with:
          path: .
          # Scan working tree; use our ignore file; fail on findings.
          extra_args: >-
            --exclude-paths .trufflehogignore
            --no-update
            --fail
