name: Secret Scans

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required to scan pull_request events per action docs
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Use repo policy file
          config-path: .gitleaks.toml
          redact: true
          fail-on-detection: true

  secretlint:
    name: Secretlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Secretlint
        run: |
          npx -y \
            --package=secretlint \
            --package=@secretlint/secretlint-rule-preset-recommend \
            --package=@secretlint/formatter-stylish \
            secretlint --format @secretlint/formatter-stylish .

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install TruffleHog (PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade trufflehog
      - name: Run TruffleHog on PR diff
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          trufflehog git \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.sha }}" \
            --only-verified \
            --exclude-paths .trufflehogignore \
            --no-update \
            --fail
      - name: Run TruffleHog on full tree (push)
        if: ${{ github.event_name == 'push' }}
        run: |
          trufflehog filesystem . \
            --only-verified \
            --exclude-paths .trufflehogignore \
            --no-update \
            --fail
